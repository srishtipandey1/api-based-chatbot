<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ask AI</title>
    <style>
      :root { color-scheme: light; --accent: #4f46e5; --accent-soft: #eef2ff; }
      * { box-sizing: border-box; }
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: linear-gradient(135deg, #f8fbff 0%, #eef2ff 100%);
        color: #111827;
      }
      .wrap {
        max-width: 760px;
        margin: 36px auto;
        padding: 24px;
        background: rgba(255,255,255,0.95);
        border-radius: 20px;
        box-shadow: 0 14px 40px rgba(79, 70, 229, 0.12);
        backdrop-filter: blur(8px);
      }
      .header { margin-bottom: 14px; }
      .badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.8rem;
        font-weight: 700;
        margin-bottom: 8px;
      }
      h1 { margin: 0 0 8px; font-size: 1.8rem; }
      .subtitle { margin: 0; color: #6b7280; font-size: 0.95rem; }
      .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0 10px; }
      .chip {
        border: 1px solid #dbe4ef;
        background: white;
        color: #374151;
        border-radius: 999px;
        padding: 8px 11px;
        cursor: pointer;
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }
      .chip:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(15,23,42,0.08); border-color: var(--accent); }
      #chat {
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 12px;
        min-height: 320px;
        max-height: 420px;
        overflow-y: auto;
        background: #fcfdff;
      }
      .bubble {
        margin: 8px 0;
        padding: 10px 12px;
        border-radius: 12px;
        max-width: 82%;
        line-height: 1.45;
        animation: fadeIn 220ms ease-out;
      }
      .user {
        margin-left: auto;
        background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
        color: white;
      }
      .assistant {
        background: var(--accent-soft);
        color: #111827;
        border-left: 3px solid #818cf8;
      }
      .typing {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 0;
      }
      .typing span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #6b7280;
        animation: bounce 1.1s infinite ease-in-out;
      }
      .typing span:nth-child(2) { animation-delay: 0.16s; }
      .typing span:nth-child(3) { animation-delay: 0.32s; }
      form { display: flex; gap: 10px; margin-top: 14px; }
      input {
        flex: 1;
        padding: 11px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        transition: border-color 180ms ease, box-shadow 180ms ease;
      }
      input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
      button {
        padding: 10px 14px;
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: white;
        cursor: pointer;
        transition: transform 180ms ease, box-shadow 180ms ease;
      }
      button:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(79,70,229,0.18); }
      .hint { color: #64748b; font-size: 0.92rem; margin-top: 10px; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.6; } 40% { transform: translateY(-4px); opacity: 1; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="badge">Thoughtful assistant</div>
        <h1>Ask AI</h1>
        <p class="subtitle">A calm, simple chat experience with a little extra polish.</p>
      </div>

      <div class="chips">
        <button class="chip" type="button" data-prompt="Explain this idea in simple terms">Explain a concept</button>
        <button class="chip" type="button" data-prompt="Help me plan my day">Plan my day</button>
        <button class="chip" type="button" data-prompt="Summarize this in three bullet points">Summarize clearly</button>
      </div>

      <div id="chat" aria-live="polite"></div>
      <form id="chat-form">
        <input id="message" name="message" placeholder="Ask something thoughtful..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
      <div class="hint">Press Enter to send • the bot remembers your last few exchanges.</div>
    </div>

    <script>
      const chat = document.getElementById('chat');
      const form = document.getElementById('chat-form');
      const input = document.getElementById('message');
      const chips = document.querySelectorAll('.chip');

      function addBubble(text, role) {
        const div = document.createElement('div');
        div.className = `bubble ${role}`;
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      function showTypingIndicator() {
        const div = document.createElement('div');
        div.className = 'bubble assistant';
        div.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
      }

      chips.forEach((chip) => {
        chip.addEventListener('click', () => {
          const prompt = chip.getAttribute('data-prompt');
          input.value = prompt;
          input.focus();
        });
      });

      addBubble('Hi! I’m Ask AI. Ask me anything and I’ll keep it clear and useful.', 'assistant');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const message = input.value.trim();
        if (!message) return;

        addBubble(message, 'user');
        input.value = '';
        const typingIndicator = showTypingIndicator();

        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
          });

          const data = await response.json();
          typingIndicator.remove();
          addBubble(data.reply, 'assistant');
        } catch (error) {
          typingIndicator.remove();
          addBubble('Something went wrong while reaching the assistant.', 'assistant');
        }
      });
    </script>
  </body>
</html>
